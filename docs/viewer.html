<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cluedoc — paper viewer</title>
<link rel="stylesheet" href="assets/style.css">
<style>
  .viewer { display:grid; grid-template-columns: 260px 1fr; gap:0; min-height:100vh; }
  .sidebar {
    border-right:1px solid var(--line); padding:24px 18px; background:var(--bg-panel);
    font-family:var(--mono); font-size:13px; position:sticky; top:60px; align-self:start;
    max-height:calc(100vh - 60px); overflow:auto;
  }
  .sidebar .exname { font-weight:700; color:var(--ink); margin:0 0 4px; }
  .sidebar .exrepo { color:var(--ink-faint); font-size:11px; margin:0 0 18px; word-break:break-all; }
  .tree ul { list-style:none; margin:0; padding-left:14px; border-left:1px solid var(--line); }
  .tree > ul { padding-left:0; border-left:none; }
  .tree li { margin:3px 0; }
  .tree a { color:var(--ink-soft); display:inline-block; padding:2px 0; }
  .tree a.active { color:var(--accent); font-weight:700; }
  .tree a:hover { color:var(--accent); text-decoration:none; }
  .tree .loading { color:var(--ink-faint); }

  .paper { padding:32px 40px 80px; max-width:820px; min-width:0; }
  .crumbs { font-family:var(--mono); font-size:12px; color:var(--ink-faint); margin:0 0 24px; }
  .crumbs a { color:var(--ink-soft); }
  .paper-body { font-family:var(--serif); font-size:17px; line-height:1.7; color:var(--ink); }
  .paper-body h1 { font-size:32px; line-height:1.15; margin:0 0 20px; }
  .paper-body h2 { font-family:var(--sans); font-size:15px; text-transform:uppercase; letter-spacing:.06em;
    color:var(--accent); margin:38px 0 12px; padding-bottom:6px; border-bottom:1px solid var(--line); }
  .paper-body h3 { font-family:var(--sans); font-size:18px; margin:26px 0 10px; }
  .paper-body p, .paper-body li { color:var(--ink); }
  .paper-body a { color:var(--accent); }
  .paper-body ul, .paper-body ol { padding-left:22px; }
  .paper-body code { font-family:var(--mono); font-size:.85em; background:var(--accent-soft);
    padding:1px 5px; border-radius:4px; }
  .paper-body pre { background:var(--term-bg); color:var(--term-ink); font-family:var(--mono);
    font-size:12.5px; line-height:1.5; padding:16px 18px; border-radius:var(--radius); overflow-x:auto; }
  .paper-body pre code { background:none; padding:0; color:inherit; font-size:inherit; }
  .paper-body pre.banner { color:var(--accent); }
  .paper-body .mermaid { background:var(--bg-panel); border:1px solid var(--line);
    border-radius:var(--radius); padding:18px; text-align:center; overflow-x:auto; }
  .paper-body table { border-collapse:collapse; width:100%; font-family:var(--sans); font-size:14px; }
  .paper-body th, .paper-body td { border:1px solid var(--line); padding:8px 12px; text-align:left; }
  .paper-body blockquote { border-left:3px solid var(--accent); margin:0; padding:4px 16px; color:var(--ink-soft); }
  .paper-body img { max-width:100%; }
  .paper-body .gh-link {
    display:inline-flex; align-items:center; gap:8px; font-family:var(--mono); font-size:13px;
    margin:0 0 22px; padding:8px 14px; border:1px solid var(--line-strong); border-radius:8px;
    color:var(--ink-soft); background:var(--bg-panel);
  }
  .paper-body .gh-link span { color:var(--accent); }
  .paper-body .gh-link:hover { border-color:var(--accent); color:var(--accent); text-decoration:none; }
  .status { padding:60px 40px; font-family:var(--mono); color:var(--ink-faint); }

  @media (max-width:820px) {
    .viewer { grid-template-columns:1fr; }
    .sidebar { position:static; max-height:none; border-right:none; border-bottom:1px solid var(--line); }
    .paper { padding:24px 20px 60px; }
  }
</style>
</head>
<body>

<nav class="nav">
  <div class="wrap">
    <a class="brand" href="index.html"><span class="dot">◆</span> cluedoc</a>
    <span class="spacer"></span>
    <a class="navlink" href="examples.html">← All examples</a>
    <a class="navlink" href="https://github.com/KeunwooPark/cluedoc">GitHub</a>
  </div>
</nav>

<div class="viewer">
  <aside class="sidebar">
    <p class="exname" id="exName">Example</p>
    <p class="exrepo" id="exRepo"></p>
    <nav class="tree" id="tree"><span class="loading">building tree…</span></nav>
  </aside>
  <main class="paper">
    <div class="crumbs" id="crumbs"></div>
    <article class="paper-body" id="body"><div class="status">Loading paper…</div></article>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.1/dist/mermaid.min.js"></script>
<script src="assets/viewer.js"></script>
</body>
</html>
