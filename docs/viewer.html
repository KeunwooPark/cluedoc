<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cluedoc: paper viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
<style>
  .viewer { display:grid; grid-template-columns: 264px 1fr; gap:0; min-height:100vh; }
  .sidebar {
    border-right:1px solid var(--color-rule); padding:var(--space-lg) var(--space-md);
    background:var(--color-paper-2);
    font-family:var(--mono); font-size:13px; position:sticky; top:60px; align-self:start;
    max-height:calc(100vh - 60px); overflow:auto;
  }
  .sidebar .exname { font-family:var(--display); font-weight:600; font-size:17px; color:var(--color-ink); margin:0 0 2px; }
  .sidebar .exrepo { color:var(--color-neutral); font-size:11px; margin:0 0 var(--space-lg); word-break:break-all; }
  .tree ul { list-style:none; margin:0; padding-left:14px; border-left:1px solid var(--color-rule); }
  .tree > ul { padding-left:0; border-left:none; }
  .tree li { margin:3px 0; }
  .tree a { color:var(--color-muted); display:inline-block; padding:2px 0; }
  .tree a.active { color:var(--color-accent); font-weight:700; }
  .tree a:hover { color:var(--color-accent); text-decoration:none; }
  .tree .loading { color:var(--color-neutral); }

  .paper { padding:var(--space-xl) var(--space-2xl) var(--space-3xl); max-width:840px; min-width:0; }
  .crumbs { font-family:var(--mono); font-size:12px; color:var(--color-neutral); margin:0 0 var(--space-lg); }
  .crumbs a { color:var(--color-muted); }
  .paper-body { font-family:var(--serif); font-size:18px; line-height:1.7; color:var(--color-ink); }
  .paper-body h1 { font-family:var(--display); font-optical-sizing:auto; font-weight:600; font-size:36px; line-height:1.1; letter-spacing:-0.015em; margin:0 0 var(--space-lg); }
  .paper-body h2 { font-family:var(--mono); font-size:13px; text-transform:uppercase; letter-spacing:.1em;
    color:var(--color-accent); margin:var(--space-2xl) 0 var(--space-md); padding-bottom:6px; border-bottom:1px solid var(--color-rule); }
  .paper-body h3 { font-family:var(--display); font-weight:600; font-size:20px; margin:var(--space-xl) 0 var(--space-sm); }
  .paper-body p, .paper-body li { color:var(--color-ink); }
  .paper-body a { color:var(--color-accent); }
  .paper-body ul, .paper-body ol { padding-left:22px; }
  .paper-body code { font-family:var(--mono); font-size:.82em; background:var(--color-blue-soft);
    color:color-mix(in srgb, var(--color-blue) 70%, var(--color-ink)); padding:1px 5px; border-radius:3px; }
  .paper-body pre { background:var(--color-paper-3); color:var(--color-ink); font-family:var(--mono);
    font-size:12.5px; line-height:1.6; padding:var(--space-md) var(--space-lg); border-radius:var(--radius);
    border:1px solid var(--color-rule); overflow-x:auto; }
  .paper-body pre code { background:none; padding:0; color:inherit; font-size:inherit; }
  .paper-body pre.banner { color:var(--color-accent); }
  .paper-body .mermaid { position:relative; background:var(--color-paper-2); border:1px solid var(--color-rule);
    border-radius:var(--radius); padding:var(--space-lg); text-align:center; overflow-x:auto; }
  .mermaid-expand {
    position:absolute; top:8px; right:8px; z-index:2; cursor:pointer;
    font-family:var(--mono); font-size:11px; letter-spacing:.04em;
    padding:4px 8px; border:1px solid var(--color-rule-2); border-radius:var(--radius);
    background:var(--color-paper); color:var(--color-muted);
    opacity:0; transition:opacity .15s ease;
  }
  .paper-body .mermaid:hover .mermaid-expand, .mermaid-expand:focus-visible { opacity:1; }
  .mermaid-expand:hover { color:var(--color-accent); border-color:var(--color-accent); }

  /* full-screen diagram lightbox */
  .mmz-overlay { position:fixed; inset:0; z-index:100; display:none;
    background:color-mix(in srgb, var(--color-ink) 82%, transparent); }
  .mmz-overlay.open { display:block; }
  .mmz-stage { position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    overflow:hidden; cursor:grab; touch-action:none; }
  .mmz-stage.grabbing { cursor:grabbing; }
  .mmz-holder { will-change:transform; transform-origin:center center; }
  .mmz-holder svg { display:block; max-width:none; background:var(--color-paper);
    border-radius:var(--radius); padding:24px; box-shadow:0 12px 40px rgba(0,0,0,.35); }
  .mmz-toolbar { position:absolute; top:14px; right:14px; z-index:2; display:flex; gap:6px; }
  .mmz-toolbar button { font-family:var(--mono); font-size:15px; min-width:36px; height:36px; padding:0 10px;
    border:1px solid var(--color-rule-2); border-radius:var(--radius);
    background:var(--color-paper); color:var(--color-ink); cursor:pointer; line-height:1; }
  .mmz-toolbar button:hover { color:var(--color-accent); border-color:var(--color-accent); }
  .paper-body table { border-collapse:collapse; width:100%; font-family:var(--serif); font-size:15px; }
  .paper-body th, .paper-body td { border:1px solid var(--color-rule); padding:8px 12px; text-align:left; }
  .paper-body th { background:var(--color-paper-3); }
  .paper-body blockquote { border-left:3px solid var(--color-spark); margin:0; padding:4px var(--space-md); color:var(--color-muted); }
  .paper-body img { max-width:100%; }
  .paper-body .gh-link {
    display:inline-flex; align-items:center; gap:8px; font-family:var(--mono); font-size:13px;
    margin:0 0 var(--space-lg); padding:8px 14px; border:1px solid var(--color-rule-2); border-radius:var(--radius);
    color:var(--color-muted); background:var(--color-paper-2);
  }
  .paper-body .gh-link span { color:var(--color-accent); }
  .paper-body .gh-link:hover { border-color:var(--color-accent); color:var(--color-accent); text-decoration:none; }
  .status { padding:var(--space-2xl) var(--space-2xl); font-family:var(--mono); color:var(--color-neutral); }

  @media (max-width:820px) {
    .viewer { grid-template-columns:1fr; }
    .sidebar { position:static; max-height:none; border-right:none; border-bottom:1px solid var(--color-rule); top:0; }
    .paper { padding:var(--space-lg) var(--space-md) var(--space-2xl); }
  }
</style>
</head>
<body>

<header class="masthead">
  <div class="wrap running-head">
    <a class="wordmark" href="index.html">cluedoc</a>
    <span class="spacer"></span>
    <nav class="masthead-links">
      <a href="examples.html">← All examples</a>
      <a href="https://github.com/KeunwooPark/cluedoc">GitHub</a>
    </nav>
  </div>
</header>

<div class="viewer">
  <aside class="sidebar">
    <p class="exname" id="exName">Example</p>
    <p class="exrepo" id="exRepo"></p>
    <nav class="tree" id="tree"><span class="loading">building tree…</span></nav>
  </aside>
  <main class="paper">
    <div class="crumbs" id="crumbs"></div>
    <article class="paper-body" id="body"><div class="status">Loading paper…</div></article>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.1/dist/mermaid.min.js"></script>
<script src="assets/viewer.js"></script>
</body>
</html>
